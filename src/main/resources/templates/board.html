<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Task Board</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/styles.css}">

</head>

<body>

<div class="container-fluid mt-4">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2 class="title">Task Board</h2>

<button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#taskModal">
Nueva tarea
</button>

</div>

<div class="row">

<!-- PENDIENTE -->
<div class="col-md-4">

<div class="board-column">

<h4 class="d-flex justify-content-between align-items-center">Pendiente
<span class="badge bg-primary" th:text="${#lists.size(pendientes)}"></span>
</h4>

<div class="task-column" data-estado="PENDIENTE">

<div class="card task-card"
th:each="task : ${pendientes}"
th:attr="data-id=${task.id}"
draggable="true">

<div class="card-body">

<h5 th:text="${task.titulo}"></h5>

<p th:text="${task.descripcion}"></p>

<small th:text="${task.fechaLimite}"></small>

<button class="btn btn-sm btn-danger mt-2"
th:onclick="'eliminar('+${task.id}+')'">

Eliminar

</button>

</div>
</div>

</div>
</div>
</div>


<!-- EN PROGRESO -->
<div class="col-md-4">

<div class="board-column">

<h4 class="d-flex justify-content-between align-items-center">En progreso
<span class="badge bg-warning text-dark" th:text="${#lists.size(progreso)}"></span>
</h4>

<div class="task-column" data-estado="EN_PROGRESO">

<div class="card task-card"
th:each="task : ${progreso}"
th:attr="data-id=${task.id}"
draggable="true">

<div class="card-body">

<h5 th:text="${task.titulo}"></h5>

<p th:text="${task.descripcion}"></p>

<small th:text="${task.fechaLimite}"></small>

<button class="btn btn-sm btn-danger mt-2"
th:onclick="'eliminar('+${task.id}+')'">

Eliminar

</button>

</div>
</div>

</div>
</div>
</div>


<!-- TERMINADO -->
<div class="col-md-4">

<div class="board-column">

<h4 class="d-flex justify-content-between align-items-center">Terminado
<span class="badge bg-success" th:text="${#lists.size(terminadas)}"></span>
</h4>

<div class="task-column" data-estado="TERMINADO">

<div class="card task-card"
th:each="task : ${terminadas}"
th:attr="data-id=${task.id}"
draggable="true">

<div class="card-body">

<h5 th:text="${task.titulo}"></h5>

<p th:text="${task.descripcion}"></p>

<small th:text="${task.fechaLimite}"></small>

<button class="btn btn-sm btn-danger mt-2"
th:onclick="'eliminar('+${task.id}+')'">

Eliminar

</button>

</div>
</div>

</div>
</div>
</div>

</div>

</div>


<!-- MODAL CREAR TAREA -->

<div class="modal fade" id="taskModal">

<div class="modal-dialog">

<div class="modal-content">

<form action="/board/crear" method="post">

<div class="modal-header">

<h5>Nueva tarea</h5>

</div>

<div class="modal-body">

<input class="form-control mb-2"
name="titulo"
placeholder="Título">

<textarea class="form-control mb-2"
name="descripcion"
placeholder="Descripción"></textarea>

<input class="form-control"
type="date"
name="fechaLimite">

<input type="hidden"
name="estado"
value="PENDIENTE">

</div>

<div class="modal-footer">

<button class="btn btn-primary"
type="submit">

Crear

</button>

</div>

</form>

</div>
</div>

</div>


<script src="/js/board.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
