<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Aministrador de tareas</title>

<link rel="stylesheet" th:href="@{/css/styles.css}">

</head>

<body>

<h1>Aministrador de tareas</h1>

<div class="form-container">

<form th:action="@{/tasks/crear}" method="post">

<input type="text" name="titulo" placeholder="Título" required>

<input type="text" name="descripcion" placeholder="Descripción">

<input type="date" name="fechaLimite">

<select name="estado">

<option value="PENDIENTE">Pendiente</option>
<option value="EN_PROGRESO">En progreso</option>
<option value="TERMINADO">Terminado</option>

</select>

<button type="submit">Crear tarea</button>

</form>

</div>

<div class="board">

<!-- PENDIENTES -->

<div class="column">

<h2>Pendientes</h2>

<div th:each="task : ${pendientes}" class="card">

<h3 th:text="${task.titulo}"></h3>

<p th:text="${task.descripcion}"></p>

<p class="fecha" th:text="${task.fechaLimite}"></p>

<div class="actions">

<a th:href="@{/tasks/eliminar/{id}(id=${task.id})}">Eliminar</a>

<a th:href="@{/tasks/mover/{id}/EN_PROGRESO(id=${task.id})}">
Mover →
</a>

</div>

</div>

</div>


<!-- EN PROGRESO -->

<div class="column">

<h2>En progreso</h2>

<div th:each="task : ${progreso}" class="card">

<h3 th:text="${task.titulo}"></h3>

<p th:text="${task.descripcion}"></p>

<p class="fecha" th:text="${task.fechaLimite}"></p>

<div class="actions">

<a th:href="@{/tasks/eliminar/{id}(id=${task.id})}">Eliminar</a>

<a th:href="@{/tasks/mover/{id}/TERMINADO(id=${task.id})}">
Terminar
</a>

</div>

</div>

</div>


<!-- TERMINADAS -->

<div class="column">

<h2>Terminadas</h2>

<div th:each="task : ${terminadas}" class="card">

<h3 th:text="${task.titulo}"></h3>

<p th:text="${task.descripcion}"></p>

<p class="fecha" th:text="${task.fechaLimite}"></p>

<div class="actions">

<a th:href="@{/tasks/eliminar/{id}(id=${task.id})}">
Eliminar
</a>

</div>

</div>

</div>

</div>

</body>
</html>
